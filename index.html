<!--
  ═══════════════════════════════════════════════════════════════
  🎨 디자인 자산 적용 가이드 (PNG/PSD 받았을 때 교체 위치)
  ═══════════════════════════════════════════════════════════════

  파일은 모듈식으로 작성됨. PNG 받으면 아래 슬롯에만 url() 한 줄 교체.
  같은 폴더에 'images/' 폴더 만들고 그 안에 파일 넣어두면 됨.

  [1] 전체 배경 (Poster 첫 화면)
      → .poster 의 background 교체
      → 검색: ".poster {" 안의 background 속성

  [2] 지도 이미지 (오시는 길)
      → .map-slot 의 background 교체
      → 코드 안 주석 "⭐ PNG 받으면 아래 한 줄만 활성화" 검색

  [3] RSVP 섹션 배경
      → .rsvp 의 background 교체

  [4] Detail 섹션 배경 (행사 정보)
      → .detail 의 background 교체

  [5] 그레인/노이즈 텍스처
      → body::before 의 background-image 교체

  ───────────────────────────────────────────────────────────────
  📝 교체 예시:
  background: url('images/poster-bg.png') center/cover no-repeat, var(--bg-black);

  💡 팁:
  - PNG는 1080×1920 (모바일 9:16) 권장
  - 큰 이미지는 .jpg로 (용량↓), 투명도 있는 장식은 .png
  - 텍스처는 작은 이미지 + background-repeat 권장
  ═══════════════════════════════════════════════════════════════
-->

    --crimson:     #6B0000;

    --white:       #FFFFFF;
    --white-dim:   rgba(255,255,255,.7);

    --line-soft:   rgba(255,255,255,.15);

    background: var(--bg-black);

    line-height: 1.6;

    box-shadow: 0 0 80px rgba(0,0,0,.8);
    overflow: hidden;

  @media (min-width: 432px) {
    body {
      background: #050102;
      min-height: 100vh;

  /* 곡선 라이트 (살짝만) */
  .poster::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: -10%;
    right: -10%;
    height: 50%;
    background:
      linear-gradient(125deg, transparent 40%, rgba(195,80,60,.06) 50%, transparent 60%);
    pointer-events: none;
    filter: blur(2px);
  }

  /* ─── 상단 헤더 (A 구조) ─── */
  .p-top {
    position: relative;
    z-index: 5;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .p-top .logo {
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: .15em;
    color: var(--paper);
  }
  /* 좌측 상단 OFF-AIR 로고 이미지 (검정 배경 투명 처리됨) */
  .p-top .top-logo {
    height: 14px;
    width: auto;
    display: block;
    object-fit: contain;
  }
  .p-top .right {
    text-align: right;
    font-family: "Inter", sans-serif;
    font-weight: 400;
    font-size: 8px;
    letter-spacing: .25em;
    color: var(--paper-dim);
    line-height: 1.5;
    text-transform: uppercase;
  }

  /* ─── 메인 영역: 세로 한자 + 영문 INVITATION 결합 ─── */
  .p-main {
    margin-top: 56px;
    position: relative;
    z-index: 5;
  }

  /* 세로 한자 (A 스타일, 흰색) */
  .p-vertical {
    position: absolute;
    top: 4px;
    left: 4px;
    z-index: 2;
    width: 32%;
    max-width: 110px;
  }
  /* 캘리그라피 이미지 (투명 PNG - 검정 배경 제거됨) */
  .p-vertical .calligraphy {
    width: 100%;
    height: auto;
    display: block;
    /* 살짝 깊이감만 */
    filter: drop-shadow(0 2px 14px rgba(0,0,0,.6));
    pointer-events: none;
    user-select: none;
  }

  /* 우측 영역: INVITATION 영문 + 메인 카피 */
  .p-right-block {
    margin-left: 38%;
    width: 62%;
    padding-top: 8px;
  }

  /* INVITATION (B 스타일 Bodoni, 작게) */
  .p-en {
    font-family: "Bodoni Moda", "Playfair Display", serif;
    font-weight: 900;
    font-size: 28px;
    line-height: 1;
    color: var(--paper);
    letter-spacing: .005em;
    margin-bottom: 8px;
  }
  .p-en-sub {
    font-family: "Inter", sans-serif;
    font-weight: 400;
    font-size: 8px;
    letter-spacing: .25em;
    color: var(--paper-dim);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* 부 카피 (한자 + 영문) */
  .p-subcopy {
    border-top: 1px solid var(--line-paper);
    border-bottom: 1px solid var(--line-paper);
    padding: 14px 0;
  }
  .p-subcopy .ko-cn {
    font-family: "Noto Serif SC", serif;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: .15em;
    color: var(--paper);
    margin-bottom: 4px;
  }
  .p-subcopy .en-sub {
    font-family: "Inter", sans-serif;
    font-weight: 400;
    font-size: 7px;
    letter-spacing: .3em;
    color: var(--paper-dim);
    text-transform: uppercase;
  }

  /* ─── 본문 초대 카피 ─── */
  .p-invite {
    margin-top: 56px;
    position: relative;
    z-index: 5;
    font-family: "Noto Serif SC", serif;
    font-weight: 400;
    font-size: 12px;
    line-height: 2;
    color: var(--paper);
    letter-spacing: .08em;
  }
  /* 한국어 보조 카피 (작게, 흐리게) */
  .p-invite-kr {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--line-paper);
    font-family: "Noto Serif KR", serif;
    font-weight: 300;
    font-size: 10px;
    line-height: 1.9;
    color: var(--paper-dim);
    letter-spacing: .04em;
  }

  /* ─── 디바이더 ─── */
  .p-divider {
    margin: 36px 40px 0 auto;
    width: 1px;
    height: 50px;
    background: var(--paper);
    opacity: .5;
  }

  /* ─── 시간 / 주소 ─── */
  .p-info {
    margin-top: 20px;
    text-align: right;
    position: relative;
    z-index: 5;
  }
  .p-info .row { margin-bottom: 16px; }
  .p-info .lbl {
    font-family: "Noto Serif SC", serif;
    font-weight: 400;
    font-size: 10px;
    color: var(--paper-dim);
    letter-spacing: .2em;
    margin-bottom: 4px;
  }
  .p-info .val {
    font-family: "Noto Serif SC", serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--paper);
    letter-spacing: .05em;
    border-bottom: 1px solid var(--paper);
    padding-bottom: 2px;
    display: inline-block;
  }

  /* ─── 푸터 ─── */
  .p-footer {
    margin-top: auto;
    padding-top: 56px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--line-paper);
    padding-top: 16px;
    position: relative;
    z-index: 5;
  }
  .p-footer .left {
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 8px;
    letter-spacing: .15em;
    color: var(--paper-dim);
    line-height: 1.4;
    text-transform: uppercase;
  }
  .p-footer .center {
    font-family: "Noto Serif TC", serif;
    font-weight: 500;
    font-size: 11px;
    color: var(--paper);
    letter-spacing: .1em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .p-footer .center .icon {
    width: 16px;
    height: 16px;
    color: var(--crimson-bright);
  }
  .p-footer .right {
    font-family: "Bodoni Moda", serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: .1em;
    color: var(--paper);
  }

  /* SCROLL HINT */
  .scroll-hint {
    text-align: center;
    padding: 20px 0 0;
    font-family: "Inter", sans-serif;
    font-weight: 400;
    font-size: 9px;
    letter-spacing: .35em;
    color: var(--paper-dim);
    text-transform: uppercase;
    animation: float 2.5s ease-in-out infinite;
    position: relative;
    z-index: 5;
  }
  .scroll-hint .arrow {
    display: block;
    margin: 6px auto 0;
    width: 1px;
    height: 18px;
    background: var(--paper);
    opacity: .5;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); opacity: .85; }
    50%     { transform: translateY(4px); opacity: 1; }
  }

  .detail::before {
    content: "";
    position: absolute;
    top: 0; left: 32px; right: 32px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--crimson-mid), transparent);
  }
  .d-eye {
    text-align: center;
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 9px;
    letter-spacing: .4em;
    color: var(--crimson-bright);
    text-transform: uppercase;
    margin-bottom: 12px;
    text-shadow: 0 0 8px rgba(195,27,27,.4);
  }
  .d-title {
    text-align: center;
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: 32px;
    color: var(--paper);
    letter-spacing: .15em;
    margin-bottom: 6px;
  }
  .d-sub-en {
    text-align: center;
    font-family: "Bodoni Moda", serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: .25em;
    color: var(--white-dim);
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .d-body {
    font-family: "Noto Serif KR", serif;
    font-weight: 300;
    font-size: 13px;
    line-height: 2;
    color: var(--white-dim);
    text-align: center;
    margin-bottom: 36px;
  }

  /* 정보 그리드 */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px 16px;
    border-top: 1px solid var(--line-soft);
    border-bottom: 1px solid var(--line-soft);
    padding: 24px 8px;
    margin-bottom: 40px;
  }
  .info-item { text-align: center; }
  .info-item .lbl {
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 8px;
    letter-spacing: .35em;
    color: var(--crimson-bright);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .info-item .val {
    font-family: "Bodoni Moda", serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--paper);
    letter-spacing: .03em;
    margin-bottom: 2px;
  }
  .info-item .han {
    font-family: "Noto Serif SC", serif;
    font-weight: 400;
    font-size: 10px;
    color: var(--white-soft);
    letter-spacing: .12em;
  }

  /* 미니 아젠다 */
  .agenda-h {
    text-align: center;
    font-family: "Noto Serif TC", serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--paper);
    letter-spacing: .15em;
    margin-bottom: 4px;
  }
  .agenda-h-en {
    text-align: center;
    font-family: "Bodoni Moda", serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--white-dim);
    letter-spacing: .25em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .ag-row {
    display: flex;
    gap: 20px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line-soft);
  }
  .ag-row:last-child { border-bottom: none; }
  .ag-row .time {
    font-family: "Bodoni Moda", serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--crimson-bright);
    letter-spacing: .05em;
    flex: 0 0 70px;
    line-height: 1.3;
  }
  .ag-row .event {
    flex: 1;
    font-family: "Noto Serif KR", serif;
    font-weight: 400;
    font-size: 13px;
    color: var(--white-dim);
    line-height: 1.5;
  }
  .ag-row.featured .event { color: var(--paper); font-weight: 500; }
  .ag-row .event .han {
    display: block;
    font-family: "Noto Serif SC", serif;
    font-weight: 400;
    font-size: 10px;
    color: var(--white-soft);
    margin-top: 2px;
    letter-spacing: .1em;
  }

  .directions::before {
    content: "";
    position: absolute;
    top: 0; left: 32px; right: 32px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--crimson-mid), transparent);
  }

  /* 지도 슬롯 */
  .map-slot {
    width: 100%;
    aspect-ratio: 759/725;
    margin: 24px 0 32px;
    background: var(--bg-deep);
    border: 1px solid var(--line-paper);
    position: relative;
    overflow: hidden;
  }
  .map-slot .map-link {
    display: block;
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
  }
  .map-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    transition: transform .35s ease, filter .35s ease;
    filter: brightness(.92) saturate(.85);
  }
  .map-slot .map-link:hover img {
    transform: scale(1.03);
    filter: brightness(1) saturate(1);
  }
  /* 지도 위에 살짝 빨간 오버레이 */
  .map-slot::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(10,2,3,.05) 0%, transparent 30%, transparent 70%, rgba(10,2,3,.45) 100%);
    pointer-events: none;
    z-index: 1;
  }
  /* 클릭 안내 오버레이 (하단 라벨) */
  .map-slot .map-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 16px;
    background: linear-gradient(180deg, transparent 0%, rgba(10,2,3,.85) 100%);
    color: var(--paper);
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
    z-index: 2;
    pointer-events: none;
    transition: background .3s ease;
  }
  .map-slot .map-overlay svg {
    width: 14px;
    height: 14px;
    color: var(--crimson-bright);
    flex-shrink: 0;
  }
  .map-slot .map-link:hover .map-overlay {
    background: linear-gradient(180deg, transparent 0%, rgba(194,27,27,.92) 100%);
  }
  .map-slot .map-link:hover .map-overlay svg {
    color: var(--paper);
  }

  /* 주소 카드 */
  .addr-card {
    border: 1px solid var(--line-paper);
    background: rgba(0,0,0,.3);
    padding: 24px 22px;
    margin-bottom: 16px;
    text-align: center;
  }
  .addr-card .venue-name {
    font-family: "Noto Serif TC", serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--paper);
    letter-spacing: .15em;
    margin-bottom: 4px;
  }
  .addr-card .venue-en {
    font-family: "Bodoni Moda", serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--paper-dim);
    letter-spacing: .25em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .addr-card .addr-line {
    font-family: "Noto Serif KR", serif;
    font-weight: 400;
    font-size: 13px;
    color: var(--paper);
    line-height: 1.7;
    margin-bottom: 4px;
  }
  .addr-card .addr-cn {
    font-family: "Noto Serif SC", serif;
    font-weight: 400;
    font-size: 11px;
    color: var(--white-soft);
    line-height: 1.6;
    letter-spacing: .05em;
  }

  /* 교통/주차 안내 리스트 */
  .transit-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .transit-item {
    padding: 16px 18px;
    border: 1px solid var(--line-soft);
    background: rgba(0,0,0,.2);
    text-align: center;
  }
  .transit-item .body { width: 100%; }
  .transit-item .lbl {
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 9px;
    letter-spacing: .3em;
    color: var(--crimson-bright);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .transit-item .val {
    font-family: "Noto Serif KR", serif;
    font-weight: 400;
    font-size: 13px;
    color: var(--paper);
    line-height: 1.6;
  }
  .transit-item .val .han {
    display: block;
    font-family: "Noto Serif SC", serif;
    font-weight: 400;
    font-size: 10px;
    color: var(--white-soft);
    margin-top: 4px;
    letter-spacing: .08em;
  }

  .join-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 22px 28px;
    background: linear-gradient(135deg, var(--crimson-bright) 0%, var(--crimson-mid) 100%);
    border: 1px solid rgba(238,227,208,.4);
    color: var(--paper);
    cursor: pointer;
    position: relative;
    transition: all .3s ease;
    margin-top: 24px;
    box-shadow:
      0 0 0 1px rgba(238,227,208,.1),
      0 8px 30px rgba(195,27,27,.4),
      inset 0 0 30px rgba(0,0,0,.3);
  }
  .join-btn::after {
    content: "";
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(238,227,208,.2);
    pointer-events: none;
  }
  .join-btn:active { transform: translateY(2px); }
  .join-btn:hover {
    background: linear-gradient(135deg, #E94B30 0%, var(--crimson-bright) 100%);
  }
  .join-btn .join-main {
    font-family: "Noto Serif SC", "Bodoni Moda", serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: .25em;
    color: var(--paper);
    line-height: 1;
  }
  .join-btn .join-apply {
    font-family: "Inter", sans-serif;
    font-weight: 400;
    font-size: 9px;
    letter-spacing: .4em;
    color: var(--paper-dim);
    text-transform: uppercase;
    line-height: 1;
  }
  .deadline {
    font-family: "Noto Serif KR", serif;
    font-weight: 300;
    font-size: 11px;
    color: var(--white-dim);
    margin-top: 24px;
    line-height: 1.7;
  }
  .deadline .key {
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 10px;
    color: var(--crimson-bright);
    letter-spacing: .25em;
    text-transform: uppercase;
  }

  /* ════════════════════ FOOTER ════════════════════ */
  footer {
    padding: 48px 32px 48px;
    text-align: center;
    /* 9번 텍스처 + 검정 오버레이 40% */

  /* 로고 영역 (흰 박스 제거 - 검정 푸터에 직접 표시) */
  .footer-logos {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 28px;
    margin-bottom: 28px;
    padding: 12px 0;
  }
  .footer-logos .logo {
    object-fit: contain;
    display: block;
  }
  /* OFF-AIR: 흰색 로고 (검정 배경 투명 처리됨) - 가로 매우 김 (4:1) */
  .footer-logos .logo.offair {
    height: 30px;
    max-width: 130px;
  }
  /* 小红书: 투명 배경, 빨간 로고 + 흰 부제 (가로형 1.37:1) */
  .footer-logos .logo.xhs {
    height: 94px;
    max-width: 168px;
  }
  /* MOUTAI: 컬러 로고 (정사각형) */
  .footer-logos .logo.moutai {
    height: 44px;
    width: 44px;
  }
  /* 모바일 좁은 화면 */
  @media (max-width: 360px) {
    .footer-logos { gap: 20px; }
    .footer-logos .logo.offair { height: 24px; max-width: 100px; }
    .footer-logos .logo.xhs { height: 77px; max-width: 142px; }
    .footer-logos .logo.moutai { height: 38px; width: 38px; }
  }

  .copyright {
    font-family: "Inter", sans-serif;
    font-weight: 300;
    font-size: 10px;
    color: var(--white-soft);
    letter-spacing: .15em;
    line-height: 1.8;
  }

  /* ════════════════════ MODAL ════════════════════ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.9);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s ease;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    width: 100%;
    max-width: 430px;
    max-height: 92vh;
    background:
      radial-gradient(ellipse at top, rgba(195,27,27,.2) 0%, transparent 60%),
      linear-gradient(180deg, #1A0405 0%, #0A0203 100%);
    border-top: 2px solid var(--paper);
    border-radius: 24px 24px 0 0;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform .5s cubic-bezier(.16,.84,.44,1);
    box-shadow: 0 -20px 80px rgba(195,27,27,.4);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--paper);
    border-radius: 2px;
    margin: 12px auto 0;
    opacity: .6;
  }
  .modal-header {
    padding: 24px 28px 20px;
    text-align: center;
    border-bottom: 1px solid var(--line-soft);
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 18px; right: 20px;
    width: 32px; height: 32px;
    border: 1px solid var(--line-soft);
    background: transparent;
    color: var(--paper);
    font-family: "Inter", sans-serif;
    font-size: 18px;
    cursor: pointer;
    border-radius: 50%;
    display: grid;
    place-items: center;
    transition: all .2s ease;
  }
  .modal-close:hover { background: var(--crimson-bright); border-color: var(--crimson-bright); color: var(--white); }
  .modal-eye {
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 9px;
    letter-spacing: .4em;
    color: var(--crimson-bright);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .modal-title {
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: 28px;
    color: var(--paper);
    letter-spacing: .12em;
    margin-bottom: 6px;
  }
  .modal-sub {
    font-family: "Noto Serif KR", serif;
    font-weight: 400;
    font-size: 11px;
    color: var(--white-dim);
    line-height: 1.7;
    margin-top: 8px;
  }
  .modal-body { padding: 24px 24px 32px; }
  .form-group { margin-bottom: 18px; }
  .form-group .lbl {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 9px;
    letter-spacing: .3em;
    color: var(--paper-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .form-group .lbl .han {
    font-family: "Noto Serif SC", serif;
    font-weight: 400;
    font-size: 10px;
    color: var(--white-soft);
    text-transform: none;
    letter-spacing: .12em;
  }
  .form-group .lbl .req { color: var(--crimson-bright); margin-left: 4px; }
  .form-group input {
    width: 100%;
    background: rgba(0,0,0,.5);
    border: 1px solid var(--line-soft);
    color: var(--paper);
    font-family: "Noto Serif KR", serif;
    font-size: 14px;
    padding: 12px 14px;
    border-radius: 0;
    transition: all .2s ease;
    -webkit-appearance: none;
  }
  .form-group input:focus {
    outline: none;
    border-color: var(--crimson-bright);
    background: rgba(26,4,5,.8);
  }
  .form-group input::placeholder { color: var(--white-soft); opacity: .5; font-style: italic; font-size: 12px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .radio-group { display: flex; gap: 10px; }
  .radio-option { flex: 1; position: relative; cursor: pointer; }
  .radio-option input { position: absolute; opacity: 0; }
  .radio-option .box {
    border: 1px solid var(--line-soft);
    background: rgba(0,0,0,.4);
    padding: 14px 12px;
    text-align: center;
    transition: all .2s ease;
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 13px;
    color: var(--white-dim);
    text-transform: uppercase;
    letter-spacing: .15em;
  }
  .radio-option .box .han {
    display: block;
    font-family: "Noto Serif SC", serif;
    font-weight: 400;
    font-size: 10px;
    margin-top: 4px;
    text-transform: none;
    letter-spacing: .12em;
  }
  .radio-option input:checked ~ .box {
    border-color: var(--crimson-bright);
    background: rgba(195,27,27,.25);
    color: var(--paper);
  }
  .submit-btn {
    width: 100%;
    margin-top: 12px;
    padding: 18px 24px;
    background: linear-gradient(135deg, var(--crimson-bright) 0%, var(--crimson-mid) 100%);
    border: 1px solid rgba(238,227,208,.4);
    color: var(--paper);
    font-family: "Bodoni Moda", serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: .3em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all .3s ease;
    box-shadow: 0 6px 24px rgba(195,27,27,.4);
  }
  .submit-btn:active { transform: translateY(2px); }
  .submit-btn:disabled { opacity: .6; cursor: not-allowed; }
  .submit-btn .han {
    font-family: "Noto Serif TC", serif;
    font-weight: 700;
    font-size: 12px;
    margin-left: 8px;
    text-transform: none;
  }
  .privacy-note {
    font-family: "Noto Serif KR", serif;
    font-weight: 300;
    font-size: 10px;
    color: var(--white-soft);
    line-height: 1.7;
    margin-top: 14px;
    text-align: center;
  }
  /* 입력 필드 아래 작은 안내 문구 */
  .field-hint {
    font-family: "Noto Serif KR", serif;
    font-weight: 300;
    font-size: 9px;
    color: var(--paper-dim);
    line-height: 1.5;
    margin-top: 6px;
    letter-spacing: .03em;
  }
  .success-state { display: none; padding: 48px 28px; text-align: center; }
  .success-state.show { display: block; }
  .success-state .seal {
    width: 96px; height: 96px;
    margin: 0 auto 24px;
    background: var(--crimson-bright);
    color: var(--paper);
    display: grid;
    place-items: center;
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: 56px;
    transform: rotate(-3deg);
    box-shadow: 0 0 24px rgba(195,27,27,.5);
  }
  .success-state h3 {
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: 24px;
    color: var(--paper);
    letter-spacing: .15em;
    margin-bottom: 16px;
  }
  .success-state p {
    font-family: "Noto Serif KR", serif;
    font-size: 13px;
    color: var(--white-dim);
    line-height: 1.7;
    margin-bottom: 24px;
  }
  body.modal-open { overflow: hidden; }

  /* 동반자 정보 섹션 (조건부 표시) */
  .companion-section {
    display: none;
    margin-top: 8px;
    padding-top: 24px;
    border-top: 1px solid var(--line-paper);
  }
  .companion-section.show {
    display: block;
    animation: slideDown .3s ease;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .companion-header {
    text-align: center;
    font-family: "Noto Serif KR", serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--crimson-bright);
    letter-spacing: .2em;
    margin-bottom: 20px;
    text-shadow: 0 0 8px rgba(195,27,27,.35);
  }
  @supports (padding: max(0px)) {
    .poster { padding-top: max(32px, env(safe-area-inset-top)); }
  }
</style>
</head>
